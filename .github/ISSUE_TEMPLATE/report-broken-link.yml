name: Report Broken Link
description: Report a BiS link that is broken or points to the wrong set
labels: [broken-link]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a broken or incorrect BiS link.
  - type: input
    id: job
    attributes:
      label: Job
      description: The job affected by the broken link.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Savage
        - Prog
        - Ultimate
        - Criterion
        - Unreal
        - Occult Crescent
        - Other
    validations:
      required: true
  - type: input
    id: encounter
    attributes:
      label: Encounter or Set Name
      description: For example Futures Rewritten or 7.4.
    validations:
      required: true
  - type: input
    id: current-url
    attributes:
      label: Current URL
      description: The URL that is broken or outdated.
    validations:
      required: true
  - type: input
    id: replacement-url
    attributes:
      label: Replacement URL
      description: If you know the correct URL, paste it here.
  - type: textarea
    id: source
    attributes:
      label: Source or context
      description: Link to the Balance page, Discord message, xivgear sheet, or other source.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any extra context that helps confirm the fix.
