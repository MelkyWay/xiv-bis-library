name: Suggest New Set
description: Suggest a new BiS, prog, or encounter set
labels: [new-set]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to suggest a new BiS, prog, or encounter set.
  - type: input
    id: job
    attributes:
      label: Job
      description: The job this set belongs to.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Savage
        - Prog
        - Ultimate
        - Criterion
        - Unreal
        - Occult Crescent
        - Other
    validations:
      required: true
  - type: input
    id: encounter
    attributes:
      label: Encounter or Set Name
      description: For example Futures Rewritten, 7.4, or Community Sets.
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Set URL
      description: Paste the XIVGear or Etro link.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Link to the Balance page, Discord message, spreadsheet, or theorycrafting source.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Explain the set, assumptions, or anything maintainers should know.
