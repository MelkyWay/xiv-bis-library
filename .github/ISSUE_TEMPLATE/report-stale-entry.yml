name: Report Stale Entry
description: Report a set that needs to be updated after a patch or balance change
labels: [stale-data]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a set that needs updating after a patch or balance change.
  - type: input
    id: job
    attributes:
      label: Job
      description: The job affected by the stale entry.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Savage
        - Prog
        - Ultimate
        - Criterion
        - Unreal
        - Occult Crescent
        - Other
    validations:
      required: true
  - type: input
    id: encounter
    attributes:
      label: Encounter or Set Name
      description: For example Futures Rewritten or 7.4.
    validations:
      required: true
  - type: input
    id: current-url
    attributes:
      label: Current URL
      description: The currently published URL.
    validations:
      required: true
  - type: textarea
    id: update-needed
    attributes:
      label: What needs to change?
      description: Explain what is stale and what the update should be.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Link to the updated Balance page, spreadsheet, or other supporting source.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Additional context, such as release timing or a patch reference.
