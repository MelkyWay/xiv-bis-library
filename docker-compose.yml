services:
  web-dev:
    build:
      context: .
      target: dev
    container_name: xiv-bis-library-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  web-preview:
    build:
      context: .
      target: preview
    container_name: xiv-bis-library-preview
    ports:
      - "4173:4173"
    command: npm run preview -- --host 0.0.0.0 --port 4173
